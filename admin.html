<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Matchup Pro - Admin Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; margin: 0; padding: 20px; }
        .card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        th { color: #a855f7; }
    </style>
</head>
<body>
    <h1>🏈 Admin Dashboard</h1>
    <div id="status">Checking credentials...</div>
    
    <div id="dashboard" style="display: none;">
        <div class="card">
            <h2>Recent Activity</h2>
            <table id="activityTable">
                <thead><tr><th>Time</th><th>User ID</th><th>Event</th><th>Sport</th><th>Details</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script src="supabase.min.js"></script>
    <script src="supabase-client.js"></script>
    <script src="admin.js"></script>
</body>
</html>
